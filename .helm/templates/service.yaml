apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.appName }}
  labels:
{{ include "t2c.labels" . | indent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ .Values.appName }}
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
