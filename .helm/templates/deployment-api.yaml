apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.appName }}-api
  labels:
{{ include "t2c.labels" . | indent 4 }}
    app.kubernetes.io/component: api
spec:
  {{- if not .Values.api.hpa.enabled }}
  replicas: {{ .Values.api.replicas }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.appName }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.appName }}
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: {{ .Values.appName }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: {{ include "t2c.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          envFrom:
            - configMapRef:
                name: {{ .Values.appName }}-config
            - secretRef:
                name: {{ .Values.appName }}-secrets
          startupProbe:
            httpGet: { path: /liveness, port: http }
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet: { path: /liveness, port: http }
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet: { path: /readiness, port: http }
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          resources:
{{ toYaml .Values.api.resources | indent 12 }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
